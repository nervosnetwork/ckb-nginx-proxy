services:
  ckb-nginx-proxy:
    container_name: ckb-nginx-proxy
    image: ghcr.io/nervosnetwork/ckb-nginx-proxy:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s